name: codex-pr-maintenance

on:
  pull_request:

permissions:
  contents: write

jobs:
  resolve-and-validate-pr-731:
    runs-on: ubuntu-24.04
    timeout-minutes: 75
    env:
      GAME_CONFIGURE_SKIP_APT: "1"
      GAME_CONFIGURE_SKIP_SUBMODULES: "1"
    steps:
      - name: Check out clean PR 731 repair branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: codex/clean-repair-pr-731
          submodules: recursive
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"
      - name: Install validation dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build ccache clang-format black \
            python3-dev pybind11-dev libboost-dev \
            libsdl2-dev libsdl2-ttf-dev libsdl2-image-dev xvfb xauth
          python3 -m pip install --upgrade -r requirements-dev.txt
      - name: Merge current main and resolve verified shared-file conflicts
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          set +e
          git merge --no-commit --no-ff origin/main
          merge_status=$?
          set -e
          if [[ $merge_status -ne 0 ]]; then
            echo "Merge reported the expected shared-file conflicts."
          fi

          # Preserve PR #731's inventory policy, then layer current-main compatibility and the verified cancel fix.
          git checkout HEAD -- src/gui/panel/CGameInventoryPanel.cpp
          git checkout origin/main -- test.py

          python3 - <<'PY'
          from pathlib import Path

          def replace_once(path: Path, old: str, new: str, label: str) -> None:
              text = path.read_text(encoding="utf-8")
              count = text.count(old)
              if count != 1:
                  raise RuntimeError(f"{label}: expected one anchor, found {count}.")
              path.write_text(text.replace(old, new, 1), encoding="utf-8")

          cpp = Path("src/gui/panel/CGameInventoryPanel.cpp")
          cpp_text = cpp.read_text(encoding="utf-8")
          slot_include = '#include "core/CSlotConfig.h"\n'
          if slot_include not in cpp_text:
              include_anchor = '#include "core/CMap.h"\n'
              if include_anchor not in cpp_text:
                  raise RuntimeError("CGameInventoryPanel.cpp include anchor was not found.")
              cpp_text = cpp_text.replace(include_anchor, include_anchor + slot_include, 1)
              cpp.write_text(cpp_text, encoding="utf-8")

          replace_once(
              cpp,
              '''bool CGameInventoryPanel::inventoryDragStart(std::shared_ptr<CGui> gui, int index,
                                                       std::shared_ptr<CGameObject> object) {
              auto item = usable_item(object);
              auto player = inventory_player(gui);
              return player && item && player->hasInInventory(item);
          }

          ''',
              '''bool CGameInventoryPanel::inventoryDragStart(std::shared_ptr<CGui> gui, int index,
                                                       std::shared_ptr<CGameObject> object) {
              auto item = usable_item(object);
              auto player = inventory_player(gui);
              return player && item && player->hasInInventory(item);
          }

          void CGameInventoryPanel::inventoryDragCancel(std::shared_ptr<CGui> gui, int index,
                                                        std::shared_ptr<CGameObject> object) {
              auto item = usable_item(object);
              auto player = inventory_player(gui);
              if (!player || !item || !player->hasInInventory(item)) {
                  return;
              }
              selectedEquipped.reset();
              selectedInventory = item;
              refreshViews();
          }

          ''',
              "inventory drag-cancel implementation",
          )

          replace_once(
              cpp,
              '''bool CGameInventoryPanel::equippedDragStart(std::shared_ptr<CGui> gui, int index,
                                                      std::shared_ptr<CGameObject> object) {
              auto item = usable_item(object);
              auto player = inventory_player(gui);
              const std::string slotName = vstd::str(index);
              return player && item && slot_exists(gui, slotName) && player->getItemAtSlot(slotName) == item;
          }

          ''',
              '''bool CGameInventoryPanel::equippedDragStart(std::shared_ptr<CGui> gui, int index,
                                                      std::shared_ptr<CGameObject> object) {
              auto item = usable_item(object);
              auto player = inventory_player(gui);
              const std::string slotName = vstd::str(index);
              return player && item && slot_exists(gui, slotName) && player->getItemAtSlot(slotName) == item;
          }

          void CGameInventoryPanel::equippedDragCancel(std::shared_ptr<CGui> gui, int index,
                                                       std::shared_ptr<CGameObject> object) {
              auto item = usable_item(object);
              auto player = inventory_player(gui);
              const std::string slotName = vstd::str(index);
              if (!player || !item || !slot_exists(gui, slotName) || player->getItemAtSlot(slotName) != item) {
                  return;
              }
              selectedInventory.reset();
              selectedEquipped = item;
              refreshViews();
          }

          ''',
              "equipped drag-cancel implementation",
          )

          header = Path("src/gui/panel/CGameInventoryPanel.h")
          replace_once(
              header,
              '''        V_METHOD(CGameInventoryPanel, inventoryDragStart, bool, std::shared_ptr<CGui>, int,
                           std::shared_ptr<CGameObject>),
          ''',
              '''        V_METHOD(CGameInventoryPanel, inventoryDragStart, bool, std::shared_ptr<CGui>, int,
                           std::shared_ptr<CGameObject>),
                  V_METHOD(CGameInventoryPanel, inventoryDragCancel, void, std::shared_ptr<CGui>, int,
                           std::shared_ptr<CGameObject>),
          ''',
              "inventory drag-cancel metadata",
          )
          replace_once(
              header,
              '''        V_METHOD(CGameInventoryPanel, equippedDragStart, bool, std::shared_ptr<CGui>, int,
                           std::shared_ptr<CGameObject>),
          ''',
              '''        V_METHOD(CGameInventoryPanel, equippedDragStart, bool, std::shared_ptr<CGui>, int,
                           std::shared_ptr<CGameObject>),
                  V_METHOD(CGameInventoryPanel, equippedDragCancel, void, std::shared_ptr<CGui>, int,
                           std::shared_ptr<CGameObject>),
          ''',
              "equipped drag-cancel metadata",
          )
          replace_once(
              header,
              '''    bool inventoryDragStart(std::shared_ptr<CGui> gui, int index, std::shared_ptr<CGameObject> object);

          ''',
              '''    bool inventoryDragStart(std::shared_ptr<CGui> gui, int index, std::shared_ptr<CGameObject> object);

              void inventoryDragCancel(std::shared_ptr<CGui> gui, int index, std::shared_ptr<CGameObject> object);

          ''',
              "inventory drag-cancel declaration",
          )
          replace_once(
              header,
              '''    bool equippedDragStart(std::shared_ptr<CGui> gui, int index, std::shared_ptr<CGameObject> object);

          ''',
              '''    bool equippedDragStart(std::shared_ptr<CGui> gui, int index, std::shared_ptr<CGameObject> object);

              void equippedDragCancel(std::shared_ptr<CGui> gui, int index, std::shared_ptr<CGameObject> object);

          ''',
              "equipped drag-cancel declaration",
          )

          panels = Path("res/config/panels.json")
          replace_once(
              panels,
              '            "dragStart": "inventoryDragStart",\n',
              '            "dragStart": "inventoryDragStart",\n            "dragCancel": "inventoryDragCancel",\n',
              "inventory drag-cancel wiring",
          )
          replace_once(
              panels,
              '            "dragStart": "equippedDragStart",\n',
              '            "dragStart": "equippedDragStart",\n            "dragCancel": "equippedDragCancel",\n',
              "equipped drag-cancel wiring",
          )

          test_path = Path("test.py")
          lines = test_path.read_text(encoding="utf-8").splitlines()

          def unique_index(target, start=0, end=None):
              end = len(lines) if end is None else end
              matches = [i for i in range(start, end) if lines[i] == target]
              if len(matches) != 1:
                  raise RuntimeError(f"Expected one line {target!r}, found {len(matches)} in range {start}:{end}.")
              return matches[0]

          def function_range(signature, next_prefix="    def "):
              start = unique_index(signature)
              for i in range(start + 1, len(lines)):
                  if lines[i].startswith(next_prefix) or lines[i] == "    @game_test":
                      return start, i
              return start, len(lines)

          start, end = function_range(
              "def activate_list_cell(list_view, gui, column, row, button=SDL_BUTTON_LEFT):", "def "
          )
          expected = [
              "def activate_list_cell(list_view, gui, column, row, button=SDL_BUTTON_LEFT):",
              "    tile = list_view.getTileSize()",
              "    list_view.mouseEvent(gui, SDL_MOUSEBUTTONDOWN, button, column * tile + tile // 2, row * tile + tile // 2)",
          ]
          if lines[start : start + 3] != expected:
              raise RuntimeError("activate_list_cell body does not match current main.")
          lines[start : start + 3] = [
              expected[0],
              expected[1],
              "    x = column * tile + tile // 2",
              "    y = row * tile + tile // 2",
              "    list_view.mouseEvent(gui, SDL_MOUSEBUTTONDOWN, button, x, y)",
              "    list_view.mouseEvent(gui, SDL_MOUSEBUTTONUP, button, x, y)",
          ]

          start, end = function_range(
              "def click_first_list_object(test_case, list_view, gui, predicate=None, button=SDL_BUTTON_LEFT):", "def "
          )
          press = unique_index(
              "                    graphic.mouseEvent(gui, SDL_MOUSEBUTTONDOWN, button, 1, 1)", start, end
          )
          lines[press : press + 1] = [
              "                    if graphic.mouseEvent(gui, SDL_MOUSEBUTTONDOWN, button, 1, 1):",
              "                        tile = list_view.getTileSize()",
              "                        list_view.mouseEvent(",
              "                            gui, SDL_MOUSEBUTTONUP, button, column * tile + tile // 2, row * tile + tile // 2",
              "                        )",
          ]

          start, end = function_range("    def test_inventory_double_select_uses_selected_item(self):")
          y_line = unique_index("        inventory_list.setYPrefferedSize(2)", start, end)
          if lines[y_line + 1] != "        inventory_list.refresh()":
              raise RuntimeError("Double-select refresh anchor changed.")
          lines.insert(y_line + 1, '        inventory_list.setDragStart("")')

          start, end = function_range("    def test_fight_panel_callbacks_and_list_views(self):")
          loop = unique_index("        for list_view in (inventory_list, equipped_list):", start, end)
          allow = unique_index("            list_view.setAllowOversize(True)", loop, min(end, loop + 12))
          if lines[allow + 1] != "            list_view.refresh()":
              raise RuntimeError("Fight-panel list refresh anchor changed.")
          lines[allow + 1 : allow + 1] = [
              '            list_view.setDragStart("")',
              '            list_view.setDragValidate("")',
              '            list_view.setDrop("")',
          ]

          start, end = function_range("    def test_inventory_quest_item_selection_is_ignored(self):")
          assert_line = unique_index(
              '        self.assertEqual(0, selected_after_quest_click.get("equippedCollection", 0))', start, end
          )
          lines[assert_line + 1 : assert_line + 1] = [
              "",
              '        inventory_list = find_list_view(panel, "inventoryCollection")',
              '        equipped_list = find_list_view(panel, "equippedCollection")',
              "        item_column, item_row, _ = find_visible_list_cell_by_type(",
              '            inventory_list, g.getGui(), "letterToBeren"',
              "        )",
              "        start_x, start_y = list_cell_center(inventory_list, item_column, item_row)",
              "        target_x, target_y = list_cell_center(equipped_list, 0, 0)",
              "        weapon_before = player.getWeapon().getTypeId() if player.getWeapon() else None",
              "",
              "        push_sdl_mouse_button_event(start_x, start_y, SDL_BUTTON_LEFT, SDL_MOUSEBUTTONDOWN)",
              "        pump_event_loop(3)",
              "        self.assertFalse(g.getGui().hasDragSession())",
              "        self.assertFalse(g.getGui().hasPointerCapture())",
              "",
              "        push_sdl_mouse_motion_event(target_x, target_y, target_x - start_x, target_y - start_y)",
              "        push_sdl_mouse_button_event(target_x, target_y, SDL_BUTTON_LEFT, SDL_MOUSEBUTTONUP)",
              "        pump_event_loop(5)",
              "",
              "        weapon_after = player.getWeapon().getTypeId() if player.getWeapon() else None",
              '        self.assertEqual(1, player.countItems("letterToBeren"))',
              "        self.assertEqual(weapon_before, weapon_after)",
          ]
          test_path.write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY

          python3 -m py_compile test.py
          python3 -m black -l 120 test.py
          clang-format -i src/gui/panel/CGameInventoryPanel.cpp src/gui/panel/CGameInventoryPanel.h \
            src/gui/panel/CListView.cpp src/gui/panel/CListView.h

          git add res/config/panels.json src/gui/panel/CGameInventoryPanel.cpp src/gui/panel/CGameInventoryPanel.h \
            src/gui/panel/CListView.cpp src/gui/panel/CListView.h test.py
          unresolved=$(git diff --name-only --diff-filter=U)
          if [[ -n "$unresolved" ]]; then
            echo "Unresolved conflicts remain:"
            echo "$unresolved"
            exit 1
          fi
          git diff --cached --check
      - name: Run static validation
        run: |
          python3 -m py_compile test.py
          python3 -m black --check -l 120 test.py
          python3 -m json.tool res/config/panels.json >/dev/null
          python3 scripts/issue_queue.py validate
      - name: Configure and build
        run: |
          GAME_CONFIGURE_BUILD_TYPES=Release ./configure.sh
          cmake --build cmake-build-release --target _game -j"$(nproc)"
      - name: Run focused inventory drag regressions
        env:
          GAME_XVFB_JOBS: "1"
          GAME_XVFB_ONLY_CHILD_TESTS: test_inventory_drag_release_outside_source_equips_item,test_inventory_preselected_drag_release_equips_item,test_inventory_drag_valid_equip_unequip_and_refresh_counts,test_inventory_drag_invalid_slot_and_cancel_keep_state,test_inventory_drag_close_or_modal_panel_cancels_without_equip,test_inventory_quest_item_selection_is_ignored,test_inventory_equipped_selection_resets_inventory_selection
        run: python3 test.py XvfbGameplayTest.test_keyboard_gameplay_under_xvfb
      - name: Commit verified merge
        shell: bash
        run: |
          set -euo pipefail
          git commit -m "Merge main into PR 731 and preserve inventory drop rules"
          git push origin HEAD:codex/clean-repair-pr-731
