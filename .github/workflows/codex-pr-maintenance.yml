name: codex-pr-maintenance

on:
  pull_request:

permissions:
  contents: write

jobs:
  fix-pr-729:
    runs-on: ubuntu-latest
    steps:
      - name: Check out PR 729 branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: codex/e02-s02-ss03-session-shutdown-1601d574
          fetch-depth: 0
      - name: Move shutdown regression to file scope
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          python3 - <<'PY'
          from pathlib import Path

          path = Path("tests/unit/test_gui.cpp")
          text = path.read_text(encoding="utf-8")
          outer = "void test_gui_routes_mouse_motion_to_target_child() {\n"
          inner = "void test_loader_gui_sessions_shutdown_stale_callbacks() {\n"
          combined = outer + inner
          if combined not in text:
              raise RuntimeError("Expected nested shutdown test marker was not found.")
          text = text.replace(combined, inner, 1)

          tail = (
              '    expect_true(secondRenderCount == renderCountAfterShutdown, '
              '"second shutdown should stop later frame rendering");\n'
              '}\n\n'
              '    SDL_SetHint(SDL_HINT_VIDEODRIVER, "dummy");\n'
          )
          replacement = (
              '    expect_true(secondRenderCount == renderCountAfterShutdown, '
              '"second shutdown should stop later frame rendering");\n'
              '}\n\n'
              'void test_gui_routes_mouse_motion_to_target_child() {\n'
              '    SDL_SetHint(SDL_HINT_VIDEODRIVER, "dummy");\n'
          )
          if tail not in text:
              raise RuntimeError("Expected shutdown-test tail anchor was not found.")
          path.write_text(text.replace(tail, replacement, 1), encoding="utf-8")
          PY
          clang-format -i tests/unit/test_gui.cpp
          git diff --check
          git add tests/unit/test_gui.cpp
          git commit -m "Fix shutdown GUI regression function placement"
          git push origin HEAD:codex/e02-s02-ss03-session-shutdown-1601d574
