name: codex-pr-maintenance

on:
  pull_request:

permissions:
  actions: read
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Download failed Linux build log
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          curl --fail --location \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/actions/jobs/82551557716/logs" \
            --output linux-build.log
          grep -n -E -C 8 '(^|[^[:alpha:]])(fatal error:|error:|undefined reference|FAILED:|ninja: build stopped|CMake Error)' \
            linux-build.log > failure-summary.txt || true
          test -s failure-summary.txt
      - name: Upload diagnostic log
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: pr-729-linux-build-diagnostic
          path: |
            linux-build.log
            failure-summary.txt
          retention-days: 1
