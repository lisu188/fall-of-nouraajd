name: codex-pr-maintenance

on:
  pull_request:

permissions:
  actions: read
  contents: read

jobs:
  diagnose-pr-731-focused-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Download failed focused-test log
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          curl --fail --location \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/actions/jobs/82557457238/logs" \
            --output focused-tests.log
          grep -n -E -C 35 '(FAILED|FAIL:|ERROR:|Traceback|AssertionError|RuntimeError|Process completed with exit code|test_inventory_|Ran [0-9]+ test)' \
            focused-tests.log > failure-summary.txt || true
          tail -n 500 focused-tests.log > focused-tests-tail.txt
          test -s failure-summary.txt
      - name: Upload focused-test diagnostic
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: pr-731-focused-test-diagnostic
          path: |
            failure-summary.txt
            focused-tests-tail.txt
          retention-days: 1
