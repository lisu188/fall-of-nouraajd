name: codex-pr-maintenance

on:
  pull_request:

permissions:
  actions: read
  contents: read

jobs:
  diagnose-pr-731-build:
    runs-on: ubuntu-latest
    steps:
      - name: Download failed build log
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          curl --fail --location \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/actions/jobs/82561817279/logs" \
            --output build.log
          grep -n -E -C 35 '(fatal error:|error:|undefined reference|FAILED:|ninja: build stopped|CMake Error|Process completed with exit code)' \
            build.log > failure-summary.txt || true
          tail -n 500 build.log > build-tail.txt
          test -s failure-summary.txt
      - name: Upload compiler diagnostic
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: pr-731-build-diagnostic
          path: |
            failure-summary.txt
            build-tail.txt
          retention-days: 1
