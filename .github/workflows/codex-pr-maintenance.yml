name: codex-pr-maintenance

on:
  pull_request:

permissions:
  actions: read
  contents: read

jobs:
  diagnose-pr-731-cancel-fix:
    runs-on: ubuntu-latest
    steps:
      - name: Download focused regression log
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          curl --fail --location \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/actions/jobs/82559081863/logs" \
            --output focused-regressions.log
          grep -n -E -C 45 '(FAIL:|FAILED|ERROR:|Traceback|AssertionError|RuntimeError|Process completed with exit code|test_inventory_)' \
            focused-regressions.log > failure-summary.txt || true
          tail -n 600 focused-regressions.log > focused-regressions-tail.txt
          test -s failure-summary.txt
      - name: Upload focused regression diagnostic
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: pr-731-cancel-fix-diagnostic
          path: |
            failure-summary.txt
            focused-regressions-tail.txt
          retention-days: 1
