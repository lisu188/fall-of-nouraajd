name: codex-pr-maintenance

on:
  pull_request:

permissions:
  actions: read
  contents: read

jobs:
  diagnose-pr-731-resolution:
    runs-on: ubuntu-latest
    steps:
      - name: Download failed resolver log
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          curl --fail --location \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/actions/jobs/82553967478/logs" \
            --output resolver.log
          grep -n -E -C 18 '(Traceback|RuntimeError|SyntaxError|IndentationError|error:|FAILED:|CONFLICT|unresolved|cannot|did not match|not found|not unique)' \
            resolver.log > failure-summary.txt || true
          test -s failure-summary.txt
      - name: Upload diagnostic summary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: pr-731-resolver-diagnostic
          path: |
            resolver.log
            failure-summary.txt
          retention-days: 1
