name: codex-pr-maintenance

on:
  pull_request:

permissions:
  contents: write

jobs:
  resolve-and-validate-pr-731:
    runs-on: ubuntu-24.04
    timeout-minutes: 75
    env:
      GAME_CONFIGURE_SKIP_APT: "1"
      GAME_CONFIGURE_SKIP_SUBMODULES: "1"
    steps:
      - name: Check out clean PR 731 repair branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: codex/clean-repair-pr-731
          submodules: recursive
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"
      - name: Install validation dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build ccache clang-format black \
            python3-dev pybind11-dev libboost-dev \
            libsdl2-dev libsdl2-ttf-dev libsdl2-image-dev xvfb xauth
          python3 -m pip install --upgrade -r requirements-dev.txt
      - name: Merge current main and resolve verified shared-file conflicts
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          set +e
          git merge --no-commit --no-ff origin/main
          merge_status=$?
          set -e
          if [[ $merge_status -ne 0 ]]; then
            echo "Merge reported the expected test.py conflict."
          fi

          # Keep PR #731 production policy, then restore the context-owned slot include from current main.
          git checkout HEAD -- src/gui/panel/CGameInventoryPanel.cpp
          # Current main already contains the newer comprehensive drag/drop GUI regressions from PR #720.
          git checkout origin/main -- test.py

          python3 - <<'PY'
          from pathlib import Path

          inventory_path = Path("src/gui/panel/CGameInventoryPanel.cpp")
          inventory_source = inventory_path.read_text(encoding="utf-8")
          slot_include = '#include "core/CSlotConfig.h"\n'
          if slot_include not in inventory_source:
              anchor = '#include "core/CMap.h"\n'
              if anchor not in inventory_source:
                  raise RuntimeError("CGameInventoryPanel.cpp include anchor was not found.")
              inventory_source = inventory_source.replace(anchor, anchor + slot_include, 1)
              inventory_path.write_text(inventory_source, encoding="utf-8")

          path = Path("test.py")
          text = path.read_text(encoding="utf-8")

          def replace_once(old: str, new: str, label: str) -> None:
              global text
              count = text.count(old)
              if count != 1:
                  raise RuntimeError(f"{label}: expected one anchor, found {count}.")
              text = text.replace(old, new, 1)

          replace_once(
              '''def activate_list_cell(list_view, gui, column, row, button=SDL_BUTTON_LEFT):
              tile = list_view.getTileSize()
              list_view.mouseEvent(gui, SDL_MOUSEBUTTONDOWN, button, column * tile + tile // 2, row * tile + tile // 2)
          ''',
              '''def activate_list_cell(list_view, gui, column, row, button=SDL_BUTTON_LEFT):
              tile = list_view.getTileSize()
              x = column * tile + tile // 2
              y = row * tile + tile // 2
              list_view.mouseEvent(gui, SDL_MOUSEBUTTONDOWN, button, x, y)
              list_view.mouseEvent(gui, SDL_MOUSEBUTTONUP, button, x, y)
          ''',
              "activate_list_cell",
          )

          replace_once(
              '''                if predicate is None or predicate(obj):
                                  graphic.mouseEvent(gui, SDL_MOUSEBUTTONDOWN, button, 1, 1)
                                  return obj
          ''',
              '''                if predicate is None or predicate(obj):
                                  if graphic.mouseEvent(gui, SDL_MOUSEBUTTONDOWN, button, 1, 1):
                                      tile = list_view.getTileSize()
                                      list_view.mouseEvent(
                                          gui, SDL_MOUSEBUTTONUP, button, column * tile + tile // 2, row * tile + tile // 2
                                      )
                                  return obj
          ''',
              "click_first_list_object",
          )

          start = text.index("    def test_inventory_double_select_uses_selected_item(self):")
          end = text.index("\n    @game_test\n", start + 1)
          segment = text[start:end]
          old = "        inventory_list.setYPrefferedSize(2)\n        inventory_list.refresh()\n"
          new = (
              "        inventory_list.setYPrefferedSize(2)\n"
              '        inventory_list.setDragStart("")\n'
              "        inventory_list.refresh()\n"
          )
          if segment.count(old) != 1:
              raise RuntimeError("Inventory double-select drag anchor was not unique.")
          segment = segment.replace(old, new, 1)
          text = text[:start] + segment + text[end:]

          start = text.index("    def test_fight_panel_callbacks_and_list_views(self):")
          end = text.index("\n    @game_test\n", start + 1)
          segment = text[start:end]
          old = (
              "        for list_view in (inventory_list, equipped_list):\n"
              "            list_view.setTileSize(50)\n"
              "            list_view.setXPrefferedSize(2)\n"
              "            list_view.setYPrefferedSize(2)\n"
              "            list_view.setAllowOversize(True)\n"
              "            list_view.refresh()\n"
          )
          new = (
              "        for list_view in (inventory_list, equipped_list):\n"
              "            list_view.setTileSize(50)\n"
              "            list_view.setXPrefferedSize(2)\n"
              "            list_view.setYPrefferedSize(2)\n"
              "            list_view.setAllowOversize(True)\n"
              '            list_view.setDragStart("")\n'
              '            list_view.setDragValidate("")\n'
              '            list_view.setDrop("")\n'
              "            list_view.refresh()\n"
          )
          if segment.count(old) != 1:
              raise RuntimeError("Inventory/equipment list drag callback anchor was not unique.")
          segment = segment.replace(old, new, 1)
          text = text[:start] + segment + text[end:]

          start = text.index("    def test_inventory_quest_item_selection_is_ignored(self):")
          end = text.index("\n    def test_fight_quest_item_selection_is_ignored(self):", start)
          segment = text[start:end]
          old = (
              '        self.assertEqual(0, selected_after_quest_click.get("inventoryCollection", 0))\n'
              '        self.assertEqual(0, selected_after_quest_click.get("equippedCollection", 0))\n'
          )
          new = old + '''
              inventory_list = find_list_view(panel, "inventoryCollection")
              equipped_list = find_list_view(panel, "equippedCollection")
              item_column, item_row, _ = find_visible_list_cell_by_type(
                  inventory_list, g.getGui(), "letterToBeren"
              )
              start_x, start_y = list_cell_center(inventory_list, item_column, item_row)
              target_x, target_y = list_cell_center(equipped_list, 0, 0)
              weapon_before = player.getWeapon().getTypeId() if player.getWeapon() else None

              push_sdl_mouse_button_event(start_x, start_y, SDL_BUTTON_LEFT, SDL_MOUSEBUTTONDOWN)
              pump_event_loop(3)
              self.assertFalse(g.getGui().hasDragSession())
              self.assertFalse(g.getGui().hasPointerCapture())

              push_sdl_mouse_motion_event(target_x, target_y, target_x - start_x, target_y - start_y)
              push_sdl_mouse_button_event(target_x, target_y, SDL_BUTTON_LEFT, SDL_MOUSEBUTTONUP)
              pump_event_loop(5)

              weapon_after = player.getWeapon().getTypeId() if player.getWeapon() else None
              self.assertEqual(1, player.countItems("letterToBeren"))
              self.assertEqual(weapon_before, weapon_after)
          '''
          if segment.count(old) != 1:
              raise RuntimeError("Quest-item drag rejection anchor was not unique.")
          segment = segment.replace(old, new, 1)
          text = text[:start] + segment + text[end:]

          path.write_text(text, encoding="utf-8")
          PY

          python3 -m black -l 120 test.py
          clang-format -i src/gui/panel/CGameInventoryPanel.cpp src/gui/panel/CGameInventoryPanel.h \
            src/gui/panel/CListView.cpp src/gui/panel/CListView.h

          git add res/config/panels.json src/gui/panel/CGameInventoryPanel.cpp src/gui/panel/CGameInventoryPanel.h \
            src/gui/panel/CListView.cpp src/gui/panel/CListView.h test.py
          unresolved=$(git diff --name-only --diff-filter=U)
          if [[ -n "$unresolved" ]]; then
            echo "Unresolved conflicts remain:"
            echo "$unresolved"
            exit 1
          fi
          git diff --cached --check
      - name: Run static validation
        run: |
          python3 -m py_compile test.py
          python3 -m black --check -l 120 test.py
          python3 -m json.tool res/config/panels.json >/dev/null
          python3 scripts/issue_queue.py validate
      - name: Configure and build
        run: |
          GAME_CONFIGURE_BUILD_TYPES=Release ./configure.sh
          cmake --build cmake-build-release --target _game -j"$(nproc)"
      - name: Run focused inventory drag regressions
        env:
          GAME_XVFB_JOBS: "1"
          GAME_XVFB_ONLY_CHILD_TESTS: test_inventory_drag_release_outside_source_equips_item,test_inventory_preselected_drag_release_equips_item,test_inventory_drag_valid_equip_unequip_and_refresh_counts,test_inventory_drag_invalid_slot_and_cancel_keep_state,test_inventory_drag_close_or_modal_panel_cancels_without_equip,test_inventory_quest_item_selection_is_ignored,test_inventory_equipped_selection_resets_inventory_selection
        run: python3 test.py XvfbGameplayTest.test_keyboard_gameplay_under_xvfb
      - name: Commit verified merge
        shell: bash
        run: |
          set -euo pipefail
          git commit -m "Merge main into PR 731 and preserve inventory drop rules"
          git push origin HEAD:codex/clean-repair-pr-731
