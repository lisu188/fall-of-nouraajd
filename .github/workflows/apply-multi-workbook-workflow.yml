name: apply multi-workbook workflow patch

on:
  push:
    branches:
      - codex/multi-workbook-queue-workflow-v3

permissions:
  contents: write

concurrency:
  group: apply-multi-workbook-workflow-${{ github.ref }}
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: codex/multi-workbook-queue-workflow-v3
          fetch-depth: 0

      - name: Reconstruct and verify patch
        shell: bash
        run: |
          set -euo pipefail
          base64 --decode .github/multi-workbook-payload/patch.xz.b64 > /tmp/multi-workbook.patch.xz
          echo "ce3cb9512c7739b0f1d1af1cec2bb3ca68b12d73af7dca44567fbb5839952ec3  /tmp/multi-workbook.patch.xz" | sha256sum --check --strict
          xz --decompress --stdout /tmp/multi-workbook.patch.xz > /tmp/multi-workbook.patch
          echo "5e5e50223920923922687d8c79c1bf26864b5db8624062ae6abf3b8af5c51343  /tmp/multi-workbook.patch" | sha256sum --check --strict
          git apply --check /tmp/multi-workbook.patch
          git apply /tmp/multi-workbook.patch

      - name: Remove temporary inspection and transport files
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/multi-workbook-inspection.txt
          rm -f .github/workflows/export-planning-workbooks.yml
          rm -rf .github/multi-workbook-payload
          rm -f .github/workflows/apply-multi-workbook-workflow.yml

      - name: Validate aggregate queue workflow
        shell: bash
        run: |
          set -euo pipefail
          python3 -m py_compile \
            scripts/issue_queue.py \
            scripts/workbook_queue.py \
            scripts/pr_review_audit.py \
            scripts/ci_change_classifier.py \
            tests/test_workbook_queue.py \
            tests/test_prompt_inventory.py
          python3 -m unittest \
            tests.test_issue_queue \
            tests.test_workbook_queue \
            tests.test_ci_change_classifier \
            tests.test_pr_review_audit \
            tests.test_prompt_inventory
          python3 scripts/workbook_queue.py workbooks --json
          python3 scripts/workbook_queue.py validate
          python3 scripts/issue_queue.py validate --workbook planning/fall_of_nouraajd_issue_proposals.xlsx
          python3 scripts/workflow_observations.py validate
          git diff --exit-code -- 'planning/*.xlsx'
          git diff --check

      - name: Commit validated workflow changes
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git diff --cached --stat
          git commit -m "Wire queue workflow to multiple workbooks"
          git push origin HEAD:codex/multi-workbook-queue-workflow-v3
