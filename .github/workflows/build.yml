name: build

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
      - name: Install Python deps
        run: python -m pip install --upgrade pillow==11.2.1
      - name: detect coverage need
        id: coverage-needed
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
          else
            base="${{ github.event.before }}"
            head="${{ github.sha }}"
            if [[ -z "${base}" || "${base}" == "0000000000000000000000000000000000000000" ]]; then
              default_branch="origin/${{ github.event.repository.default_branch }}"
              if git rev-parse --verify "${default_branch}" >/dev/null 2>&1 &&
                merge_base="$(git merge-base "${default_branch}" "${head}")"; then
                base="${merge_base}"
              else
                base="$(git rev-list --max-parents=0 "${head}")"
              fi
            fi
          fi

          run_coverage=false
          while IFS= read -r path; do
            case "${path}" in
              test.py|tests/*|scripts/run_coverage.sh|scripts/coverage_report.py|scripts/coverage_exclusions.json|src/core/*|src/handler/*|src/object/*)
                run_coverage=true
                break
                ;;
            esac
          done < <(git diff --name-only "${base}" "${head}")

          echo "run=${run_coverage}" >> "${GITHUB_OUTPUT}"
          if [[ "${run_coverage}" == "true" ]]; then
            echo "Coverage is required for this change."
          else
            echo "Coverage is not required for the changed paths."
          fi
      - name: submodules
        run: git submodule update --init --recursive
      - name: configure
        run: GAME_CONFIGURE_BUILD_TYPES=Release ./configure.sh
      - name: detect ccache directory
        id: ccache-dir
        shell: bash
        run: echo "dir=$(ccache --get-config cache_dir)" >> "${GITHUB_OUTPUT}"
      - name: Cache ccache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: ${{ steps.ccache-dir.outputs.dir }}
          key: ${{ runner.os }}-ccache-${{ hashFiles('**/CMakeLists.txt') }}
          restore-keys: ${{ runner.os }}-ccache-
      - name: build test targets
        run: cmake --build cmake-build-release --target _game for_unit_tests -j"$(nproc)"
      - name: ccache stats after build
        if: always()
        shell: bash
        run: |
          if command -v ccache >/dev/null 2>&1; then
            ccache --show-stats
          fi
      - name: test (c++)
        run: ctest --test-dir cmake-build-release --output-on-failure -R for_unit_tests
      - name: test (python)
        run: GAME_XVFB_JOBS=4 python3 test.py --jobs "$(nproc)"
      - name: coverage
        if: steps.coverage-needed.outputs.run == 'true'
        run: ./scripts/run_coverage.sh
      - name: ccache stats after coverage
        if: always()
        shell: bash
        run: |
          if command -v ccache >/dev/null 2>&1; then
            ccache --show-stats
          fi
      - name: package
        run: cmake --build cmake-build-release --target package -j"$(nproc)"
      - name: publish
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: fall-of-nouraajd-linux
          path: cmake-build-release/fall-of-nouraajd-*.tar.gz

  windows:
    runs-on: windows-2022
    env:
      CONFIGURE_BUILD_DIRS: cmake-build-release
      GAME_TEST_TIMINGS_FILE: test/test-timings-windows.json
      GAME_WINDOWS_FAST_BUILD: "1"
      GAME_WINDOWS_INSTALL_FAST_TOOLS: "1"
      GAME_WINDOWS_REQUIRE_FAST_TOOLS: "1"
      SCCACHE_DIR: ${{ github.workspace }}\.sccache
      VCPKG_BINARY_SOURCES: clear;x-gha,readwrite
      VCPKG_INSTALLED_DIR: ${{ github.workspace }}\vcpkg_installed\fast
      VCPKG_OVERLAY_TRIPLETS: ${{ github.workspace }}\cmake\triplets
      VCPKG_TARGET_TRIPLET: x64-windows-release
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
      - name: Install Python deps
        run: python -m pip install --upgrade black==25.1.0 pillow==11.2.1
      - name: submodules
        run: git submodule update --init --recursive
      - name: Set up MSVC command prompt
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756
        with:
          arch: x64
      - name: Set up vcpkg
        shell: pwsh
        run: |
          $candidateRoots = @()
          if ($env:VCPKG_INSTALLATION_ROOT) {
            $candidateRoots += $env:VCPKG_INSTALLATION_ROOT
          }
          $candidateRoots += "C:\vcpkg"
          if ($env:VCPKG_ROOT) {
            $candidateRoots += $env:VCPKG_ROOT
          }

          $vcpkgRoot = $candidateRoots |
            Where-Object { $_ -and (Test-Path (Join-Path $_ "vcpkg.exe")) } |
            Select-Object -First 1
          if (-not $vcpkgRoot) {
            throw "No usable vcpkg.exe was found in VCPKG_INSTALLATION_ROOT, C:\vcpkg, or VCPKG_ROOT"
          }

          "Using vcpkg at $vcpkgRoot"
          "VCPKG_ROOT=$vcpkgRoot" | Out-File -FilePath $env:GITHUB_ENV -Append
      - name: Enable vcpkg x-gha binary cache
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');
      - name: Cache sccache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: ${{ env.SCCACHE_DIR }}
          key: ${{ runner.os }}-sccache-${{ hashFiles('**/CMakeLists.txt', 'configure.bat') }}
          restore-keys: ${{ runner.os }}-sccache-
      - name: Cache Python test timings
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: ${{ env.GAME_TEST_TIMINGS_FILE }}
          key: ${{ runner.os }}-test-timings-${{ github.run_id }}
          restore-keys: ${{ runner.os }}-test-timings-
      - name: Configure Windows parallelism
        shell: pwsh
        run: |
          $buildJobs = [Math]::Max(1, [Environment]::ProcessorCount)
          $testJobs = 1
          "CMAKE_BUILD_PARALLEL_LEVEL=$buildJobs" | Out-File -FilePath $env:GITHUB_ENV -Append
          "GAME_TEST_JOBS=$testJobs" | Out-File -FilePath $env:GITHUB_ENV -Append
          "Windows build jobs: $buildJobs"
          "Windows Python test jobs: $testJobs"
      - name: Install native deps
        shell: pwsh
        run: |
          & "$env:VCPKG_ROOT\vcpkg.exe" install `
            --triplet "$env:VCPKG_TARGET_TRIPLET" `
            --overlay-triplets "$env:VCPKG_OVERLAY_TRIPLETS" `
            "--x-install-root=$env:VCPKG_INSTALLED_DIR"
      - name: Configure
        shell: cmd
        run: |
          call configure.bat
          if errorlevel 1 exit /b 1
      - name: Build test targets
        shell: cmd
        run: |
          cmake --build cmake-build-release --target _game for_unit_tests --parallel %CMAKE_BUILD_PARALLEL_LEVEL%
          if errorlevel 1 exit /b 1
      - name: sccache stats after build
        if: always()
        shell: cmd
        run: |
          where sccache >nul 2>nul
          if errorlevel 1 exit /b 0
          if not errorlevel 1 sccache --show-stats
      - name: test (c++)
        shell: cmd
        run: |
          ctest --test-dir cmake-build-release --output-on-failure -R for_unit_tests
          if errorlevel 1 exit /b 1
      - name: test (python)
        shell: cmd
        run: |
          set GAME_BUILD_DIR=cmake-build-release
          set GAME_BUILD_CONFIG=Release
          set PATH=%CD%\cmake-build-release;%CD%\cmake-build-release\Release;%VCPKG_INSTALLED_DIR%\%VCPKG_TARGET_TRIPLET%\bin;%PATH%
          python test.py
          if errorlevel 1 exit /b 1
      - name: package
        shell: cmd
        run: |
          cmake --build cmake-build-release --target package --parallel %CMAKE_BUILD_PARALLEL_LEVEL%
          if errorlevel 1 exit /b 1
      - name: sccache stats after package
        if: always()
        shell: cmd
        run: |
          where sccache >nul 2>nul
          if errorlevel 1 exit /b 0
          if not errorlevel 1 sccache --show-stats
      - name: publish
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: fall-of-nouraajd-windows
          path: cmake-build-release/fall-of-nouraajd-*.zip
