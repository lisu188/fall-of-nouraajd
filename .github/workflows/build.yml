name: build

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  linux-fast:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    outputs:
      coverage-needed: ${{ steps.coverage-needed.outputs.run }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - name: Install Python deps
        run: python3 -m pip install --upgrade -r requirements-dev.txt
      - name: Smoke test Python deps
        run: python3 -c "from PIL import Image; import black; print('python deps ok')"
      - name: Validate content JSON
        run: |
          python3 scripts/validate_content.py --repo-root .
          python3 -m unittest tests.test_content_validator
      - name: test (python fast)
        run: python3 test.py --suite fast
      - name: detect coverage need
        id: coverage-needed
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
          else
            base="${{ github.event.before }}"
            head="${{ github.sha }}"
            if [[ -z "${base}" || "${base}" == "0000000000000000000000000000000000000000" ]]; then
              default_branch="origin/${{ github.event.repository.default_branch }}"
              if git rev-parse --verify "${default_branch}" >/dev/null 2>&1 &&
                merge_base="$(git merge-base "${default_branch}" "${head}")"; then
                base="${merge_base}"
              else
                base="$(git rev-list --max-parents=0 "${head}")"
              fi
            fi
          fi

          run_coverage=false
          while IFS= read -r path; do
            case "${path}" in
              test.py|tests/*|scripts/run_coverage.sh|scripts/coverage_report.py|scripts/coverage_exclusions.json|native_plugins/*|src/core/*|src/handler/*|src/object/*)
                run_coverage=true
                break
                ;;
            esac
          done < <(git diff --name-only "${base}" "${head}")

          echo "run=${run_coverage}" >> "${GITHUB_OUTPUT}"
          if [[ "${run_coverage}" == "true" ]]; then
            echo "Coverage is required for this change."
          else
            echo "Coverage is not required for the changed paths."
          fi

  linux:
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    env:
      GAME_CONFIGURE_SKIP_APT: "1"
      GAME_CONFIGURE_SKIP_SUBMODULES: "1"
      GAME_TEST_TIMINGS_FILE: test/test-timings-linux.json
      GAME_XVFB_JOBS: "4"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          submodules: recursive
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - name: Install Python deps
        run: python3 -m pip install --upgrade -r requirements-dev.txt
      - name: Smoke test Python deps
        run: python3 -c "from PIL import Image; import black; print('python deps ok')"
      - name: Install native deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build ccache clang-format black \
            python3 python3-dev python3-pip python3-venv pybind11-dev python3-pil \
            libboost-dev \
            libsdl2-dev libsdl2-ttf-dev libsdl2-image-dev \
            xvfb xauth
      - name: Detect ccache metadata
        id: ccache
        shell: bash
        run: |
          compiler_id="$(c++ -dumpmachine)-$(c++ -dumpfullversion -dumpversion)"
          compiler_id="${compiler_id//[^A-Za-z0-9_.-]/-}"
          echo "dir=$(ccache --get-config cache_dir)" >> "${GITHUB_OUTPUT}"
          echo "prefix=${{ runner.os }}-ccache-release-${compiler_id}-" >> "${GITHUB_OUTPUT}"
      - name: Restore ccache
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: ${{ steps.ccache.outputs.dir }}
          key: ${{ steps.ccache.outputs.prefix }}${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            ${{ steps.ccache.outputs.prefix }}
            ${{ runner.os }}-ccache-
      - name: Cache Python test timings
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: ${{ env.GAME_TEST_TIMINGS_FILE }}
          key: ${{ runner.os }}-test-timings-linux-${{ github.run_id }}
          restore-keys: ${{ runner.os }}-test-timings-linux-
      - name: configure
        run: GAME_CONFIGURE_BUILD_TYPES=Release ./configure.sh
      - name: build test targets
        run: cmake --build cmake-build-release --target _game for_unit_tests performance_guard_tests -j"$(nproc)"
      - name: Smoke test game imports
        run: PYTHONPATH=cmake-build-release:res python3 -c "import _game; import game; print('game imports ok')"
      - name: ccache stats after build
        if: always()
        shell: bash
        run: |
          if command -v ccache >/dev/null 2>&1; then
            ccache --show-stats
          fi
      - name: test (c++)
        run: ctest --test-dir cmake-build-release --output-on-failure -R for_unit_tests
      - name: performance guard (native)
        run: ctest --test-dir cmake-build-release --output-on-failure --verbose -L performance
      - name: test (python gameplay)
        timeout-minutes: 45
        run: python3 test.py --suite gameplay --jobs "$(nproc)"
      - name: test (python ui)
        timeout-minutes: 45
        run: python3 test.py --suite ui --jobs "$(nproc)"
      - name: package
        if: github.event_name != 'pull_request'
        run: cmake --build cmake-build-release --target package -j"$(nproc)"
      - name: publish
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: fall-of-nouraajd-linux
          path: cmake-build-release/fall-of-nouraajd-*.tar.gz
      - name: Save ccache
        if: always()
        continue-on-error: true
        uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: ${{ steps.ccache.outputs.dir }}
          key: ${{ steps.ccache.outputs.prefix }}${{ github.run_id }}-${{ github.run_attempt }}

  linux-coverage:
    needs: linux-fast
    if: needs.linux-fast.outputs.coverage-needed == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 75
    env:
      COVERAGE_INCLUDE_PREFIXES: src native_plugins
      COVERAGE_REPORTER: python
      GAME_TEST_TIMINGS_FILE: test/test-timings-linux-coverage.json
      GAME_XVFB_JOBS: "4"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          submodules: recursive
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - name: Install Python deps
        run: python3 -m pip install --upgrade -r requirements-dev.txt
      - name: Smoke test Python deps
        run: python3 -c "from PIL import Image; import black; print('python deps ok')"
      - name: Install native deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build ccache clang-format black \
            python3 python3-dev python3-pip python3-venv pybind11-dev python3-pil \
            libboost-dev \
            libsdl2-dev libsdl2-ttf-dev libsdl2-image-dev \
            xvfb xauth
      - name: Detect ccache metadata
        id: ccache
        shell: bash
        run: |
          compiler_id="$(c++ -dumpmachine)-$(c++ -dumpfullversion -dumpversion)"
          compiler_id="${compiler_id//[^A-Za-z0-9_.-]/-}"
          echo "dir=$(ccache --get-config cache_dir)" >> "${GITHUB_OUTPUT}"
          echo "prefix=${{ runner.os }}-ccache-coverage-${compiler_id}-" >> "${GITHUB_OUTPUT}"
      - name: Restore ccache
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: ${{ steps.ccache.outputs.dir }}
          key: ${{ steps.ccache.outputs.prefix }}${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            ${{ steps.ccache.outputs.prefix }}
            ${{ runner.os }}-ccache-
      - name: Cache Python test timings
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: ${{ env.GAME_TEST_TIMINGS_FILE }}
          key: ${{ runner.os }}-test-timings-linux-coverage-${{ github.run_id }}
          restore-keys: ${{ runner.os }}-test-timings-linux-coverage-
      - name: coverage
        timeout-minutes: 60
        run: ./scripts/run_coverage.sh
      - name: ccache stats after coverage
        if: always()
        shell: bash
        run: |
          if command -v ccache >/dev/null 2>&1; then
            ccache --show-stats
          fi
      - name: Save ccache
        if: always()
        continue-on-error: true
        uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: ${{ steps.ccache.outputs.dir }}
          key: ${{ steps.ccache.outputs.prefix }}${{ github.run_id }}-${{ github.run_attempt }}

  windows-deps:
    runs-on: windows-2022
    timeout-minutes: 120
    outputs:
      vcpkg-installed-cache-key: ${{ steps.select-vcpkg-installed-cache.outputs.key }}
    env: &windows-env
      CONFIGURE_BUILD_DIRS: cmake-build-release
      GAME_TEST_TIMINGS_FILE: test/test-timings-windows.json
      GAME_WINDOWS_FAST_BUILD: "1"
      GAME_WINDOWS_INSTALL_FAST_TOOLS: "0"
      GAME_WINDOWS_REQUIRE_FAST_TOOLS: "1"
      SCCACHE_DIR: ${{ github.workspace }}\.sccache
      SCCACHE_SHA256: dcf489090aa5ef4c7d145e8b29f759124c803d636c3107f397bd50d425b5f341
      SCCACHE_VERSION: "0.15.0"
      VCPKG_BINARY_SOURCES: clear;x-gha,readwrite
      VCPKG_ALLOW_MODIFIED_INSTALLED_CACHE: "1"
      VCPKG_INSTALLED_DIR: ${{ github.workspace }}\vcpkg_installed\fast
      VCPKG_OVERLAY_TRIPLETS: ${{ github.workspace }}\cmake\triplets
      VCPKG_TARGET_TRIPLET: x64-windows-release
      WINDOWS_FAST_TOOLS_DIR: ${{ github.workspace }}\.windows-tools\bin
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - name: Install Python deps
        run: python -m pip install --upgrade -r requirements-dev.txt
      - name: Smoke test Python deps
        run: python -c "from PIL import Image; import black; print('python deps ok')"
      - name: Validate content JSON
        run: |
          python scripts/validate_content.py --repo-root .
          python -m unittest tests.test_content_validator
      - name: test (python fast)
        run: python test.py --suite fast
      - &setup-msvc
        name: Set up MSVC command prompt
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756
        with:
          arch: x64
      - &setup-vcpkg
        name: Set up vcpkg
        shell: pwsh
        run: |
          $candidateRoots = @()
          if ($env:VCPKG_INSTALLATION_ROOT) {
            $candidateRoots += $env:VCPKG_INSTALLATION_ROOT
          }
          $candidateRoots += "C:\vcpkg"
          if ($env:VCPKG_ROOT) {
            $candidateRoots += $env:VCPKG_ROOT
          }

          $vcpkgRoot = $candidateRoots |
            Where-Object { $_ -and (Test-Path (Join-Path $_ "vcpkg.exe")) } |
            Select-Object -First 1
          if (-not $vcpkgRoot) {
            throw "No usable vcpkg.exe was found in VCPKG_INSTALLATION_ROOT, C:\vcpkg, or VCPKG_ROOT"
          }

          "Using vcpkg at $vcpkgRoot"
          "VCPKG_ROOT=$vcpkgRoot" | Out-File -FilePath $env:GITHUB_ENV -Append
      - &enable-vcpkg-x-gha
        name: Enable vcpkg x-gha binary cache
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');
      - &setup-windows-fast-tools
        name: Set up Windows fast tools
        shell: pwsh
        timeout-minutes: 5
        run: |
          $ErrorActionPreference = "Stop"

          $toolsDir = $env:WINDOWS_FAST_TOOLS_DIR
          New-Item -ItemType Directory -Force -Path $toolsDir | Out-Null

          if (-not (Get-Command ninja -ErrorAction SilentlyContinue)) {
            python -m pip install --user ninja
            $pythonScripts = Join-Path $env:APPDATA "Python\Python312\Scripts"
            if (Test-Path $pythonScripts) {
              $env:PATH = "$pythonScripts;$env:PATH"
              $pythonScripts | Out-File -FilePath $env:GITHUB_PATH -Append
            }
          }
          if (-not (Get-Command ninja -ErrorAction SilentlyContinue)) {
            throw "ninja was not found after setup."
          }

          $sccacheExe = Join-Path $toolsDir "sccache.exe"
          if (-not (Test-Path $sccacheExe)) {
            $assetName = "sccache-v{0}-x86_64-pc-windows-msvc.zip" -f $env:SCCACHE_VERSION
            $archivePath = Join-Path $env:RUNNER_TEMP $assetName
            $extractDir = Join-Path $env:RUNNER_TEMP "sccache"
            $url = "https://github.com/mozilla/sccache/releases/download/v{0}/{1}" -f $env:SCCACHE_VERSION, $assetName

            Invoke-WebRequest -Uri $url -OutFile $archivePath
            $actualHash = (Get-FileHash -Algorithm SHA256 $archivePath).Hash.ToLowerInvariant()
            if ($actualHash -ne $env:SCCACHE_SHA256) {
              throw "Unexpected sccache archive hash '$actualHash'."
            }

            Remove-Item -Recurse -Force $extractDir -ErrorAction SilentlyContinue
            Expand-Archive -Path $archivePath -DestinationPath $extractDir -Force
            $downloadedSccache = Get-ChildItem -Path $extractDir -Recurse -Filter sccache.exe | Select-Object -First 1
            if (-not $downloadedSccache) {
              throw "sccache.exe was not found in the downloaded archive."
            }
            Copy-Item -Path $downloadedSccache.FullName -Destination $sccacheExe -Force
          }

          $toolsDir | Out-File -FilePath $env:GITHUB_PATH -Append
          "SCCACHE_EXECUTABLE=$sccacheExe" | Out-File -FilePath $env:GITHUB_ENV -Append
          $env:PATH = "$toolsDir;$env:PATH"

          ninja --version
          & $sccacheExe --version
      - name: Restore vcpkg installed tree
        id: restore-vcpkg-installed
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: ${{ env.VCPKG_INSTALLED_DIR }}
          key: ${{ runner.os }}-${{ env.VCPKG_TARGET_TRIPLET }}-vcpkg-installed-v2-${{ hashFiles('vcpkg.json', 'cmake/triplets/*.cmake', 'configure.bat', 'CMakeLists.txt', 'cmake/**/*.cmake') }}
          restore-keys: |
            ${{ runner.os }}-${{ env.VCPKG_TARGET_TRIPLET }}-vcpkg-installed-v2-${{ hashFiles('vcpkg.json', 'cmake/triplets/*.cmake', 'configure.bat', 'CMakeLists.txt', 'cmake/**/*.cmake') }}-
      - &validate-vcpkg-installed
        name: Validate vcpkg installed cache
        id: validate-vcpkg-installed
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $tripletRoot = Join-Path $env:VCPKG_INSTALLED_DIR $env:VCPKG_TARGET_TRIPLET
          $expectedPaths = @(
            "include\SDL2\SDL.h",
            "include\SDL2\SDL_image.h",
            "include\SDL2\SDL_ttf.h",
            "lib\SDL2.lib",
            "lib\SDL2_image.lib",
            "lib\SDL2_ttf.lib",
            "bin\SDL2.dll",
            "bin\SDL2_image.dll",
            "bin\SDL2_ttf.dll"
          )
          $missing = @()
          foreach ($relativePath in $expectedPaths) {
            $candidate = Join-Path $tripletRoot $relativePath
            if (-not (Test-Path $candidate)) {
              $missing += $relativePath
            }
          }

          $dryRunOutput = & "$env:VCPKG_ROOT\vcpkg.exe" install --dry-run `
            --triplet "$env:VCPKG_TARGET_TRIPLET" `
            --overlay-triplets "$env:VCPKG_OVERLAY_TRIPLETS" `
            "--x-install-root=$env:VCPKG_INSTALLED_DIR" 2>&1
          $dryRunExit = $LASTEXITCODE
          $dryRunText = $dryRunOutput -join "`n"
          $needsInstallPattern = @(
            "The following packages will be built and installed",
            "The following packages will be installed",
            "The following packages will be rebuilt"
          ) -join "|"
          $packageActionLines = @($dryRunOutput | Where-Object { $_ -match "^\s{2}(\* )?[A-Za-z0-9_.-]+:" })
          $hasOnlyModifiedPackageActions = $packageActionLines.Count -gt 0 -and -not (
            $packageActionLines | Where-Object { $_ -notmatch "^\s{2}\* " }
          )
          $allowModifiedOnly = $env:VCPKG_ALLOW_MODIFIED_INSTALLED_CACHE -eq "1"

          if ($missing.Count -gt 0) {
            "valid=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            "vcpkg installed cache is missing expected files: $($missing -join ', ')"
          } elseif ($dryRunExit -ne 0) {
            "valid=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            "vcpkg dry-run validation failed with exit code $dryRunExit."
            $dryRunText
          } elseif ($dryRunText -match $needsInstallPattern) {
            if ($allowModifiedOnly -and $hasOnlyModifiedPackageActions) {
              "valid=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
              "vcpkg installed cache has runner-local ABI metadata drift; required files are present."
              $dryRunText
            } else {
              "valid=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
              "vcpkg installed cache is incomplete; dry-run would install additional packages."
              $dryRunText
            }
          } elseif ($dryRunText -notmatch "The following packages are already installed") {
            "valid=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            "vcpkg dry-run did not confirm that all requested packages are already installed."
            $dryRunText
          } else {
            "valid=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            "vcpkg installed cache is valid."
          }
      - name: Install native deps
        if: steps.validate-vcpkg-installed.outputs.valid != 'true'
        shell: pwsh
        run: |
          & "$env:VCPKG_ROOT\vcpkg.exe" install `
            --triplet "$env:VCPKG_TARGET_TRIPLET" `
            --overlay-triplets "$env:VCPKG_OVERLAY_TRIPLETS" `
            "--x-install-root=$env:VCPKG_INSTALLED_DIR"
      - name: Save vcpkg installed tree
        if: steps.validate-vcpkg-installed.outputs.valid != 'true'
        uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: ${{ env.VCPKG_INSTALLED_DIR }}
          key: ${{ steps.restore-vcpkg-installed.outputs.cache-primary-key }}-${{ github.run_id }}-${{ github.run_attempt }}
      - name: Select vcpkg installed cache key
        id: select-vcpkg-installed-cache
        shell: pwsh
        run: |
          $key = "${{ steps.restore-vcpkg-installed.outputs.cache-matched-key }}"
          if ("${{ steps.validate-vcpkg-installed.outputs.valid }}" -ne "true") {
            $key = "${{ steps.restore-vcpkg-installed.outputs.cache-primary-key }}-${{ github.run_id }}-${{ github.run_attempt }}"
          }
          if (-not $key) {
            throw "No vcpkg installed cache key was produced."
          }
          "key=$key" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

  windows:
    needs: windows-deps
    runs-on: windows-2022
    timeout-minutes: 120
    env: *windows-env
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          submodules: recursive
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - name: Install Python deps
        run: python -m pip install --upgrade -r requirements-dev.txt
      - name: Smoke test Python deps
        run: python -c "from PIL import Image; import black; print('python deps ok')"
      - name: Validate content JSON
        run: |
          python scripts/validate_content.py --repo-root .
          python -m unittest tests.test_content_validator
      - name: test (python fast)
        run: python test.py --suite fast
      - *setup-msvc
      - *setup-vcpkg
      - *enable-vcpkg-x-gha
      - *setup-windows-fast-tools
      - name: Restore vcpkg installed tree
        id: restore-vcpkg-installed
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: ${{ env.VCPKG_INSTALLED_DIR }}
          key: ${{ needs.windows-deps.outputs.vcpkg-installed-cache-key }}
      - *validate-vcpkg-installed
      - name: Require vcpkg installed cache
        if: steps.restore-vcpkg-installed.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          throw "windows-deps did not seed a valid vcpkg installed cache for key '${{ needs.windows-deps.outputs.vcpkg-installed-cache-key }}'."
      - name: Repair vcpkg installed tree
        id: repair-vcpkg-installed
        if: steps.restore-vcpkg-installed.outputs.cache-hit == 'true' && steps.validate-vcpkg-installed.outputs.valid != 'true'
        shell: pwsh
        timeout-minutes: 10
        run: |
          "Restored vcpkg installed tree needs runner-local repair; running vcpkg install with x-gha binary cache."
          & "$env:VCPKG_ROOT\vcpkg.exe" install `
            --triplet "$env:VCPKG_TARGET_TRIPLET" `
            --overlay-triplets "$env:VCPKG_OVERLAY_TRIPLETS" `
            "--x-install-root=$env:VCPKG_INSTALLED_DIR"
          "repaired=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
      - name: Save repaired vcpkg installed tree
        if: steps.repair-vcpkg-installed.outputs.repaired == 'true'
        continue-on-error: true
        uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: ${{ env.VCPKG_INSTALLED_DIR }}
          key: ${{ needs.windows-deps.outputs.vcpkg-installed-cache-key }}-windows
      - name: Cache sccache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: ${{ env.SCCACHE_DIR }}
          key: ${{ runner.os }}-sccache-${{ hashFiles('**/CMakeLists.txt', 'configure.bat') }}
          restore-keys: ${{ runner.os }}-sccache-
      - name: Cache Python test timings
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: ${{ env.GAME_TEST_TIMINGS_FILE }}
          key: ${{ runner.os }}-test-timings-${{ github.run_id }}
          restore-keys: ${{ runner.os }}-test-timings-
      - name: Configure Windows parallelism
        shell: pwsh
        run: |
          $buildJobs = [Math]::Max(1, [Environment]::ProcessorCount)
          $testJobs = [Math]::Min(4, [Math]::Max(1, [Environment]::ProcessorCount))
          "CMAKE_BUILD_PARALLEL_LEVEL=$buildJobs" | Out-File -FilePath $env:GITHUB_ENV -Append
          "GAME_TEST_JOBS=$testJobs" | Out-File -FilePath $env:GITHUB_ENV -Append
          "Windows build jobs: $buildJobs"
          "Windows Python test jobs: $testJobs"
      - name: Configure
        timeout-minutes: 10
        shell: cmd
        run: |
          set VCPKG_MANIFEST_MODE=OFF
          call configure.bat
          if errorlevel 1 exit /b 1
      - name: Build test targets
        shell: cmd
        run: |
          cmake --build cmake-build-release --target _game for_unit_tests performance_guard_tests --parallel %CMAKE_BUILD_PARALLEL_LEVEL%
          if errorlevel 1 exit /b 1
      - name: Smoke test game imports
        shell: cmd
        run: |
          set GAME_BUILD_DIR=cmake-build-release
          set GAME_BUILD_CONFIG=Release
          set PYTHONPATH=%CD%\cmake-build-release\Release;%CD%\cmake-build-release;%CD%\res;%PYTHONPATH%
          set PATH=%CD%\cmake-build-release;%CD%\cmake-build-release\Release;%VCPKG_INSTALLED_DIR%\%VCPKG_TARGET_TRIPLET%\bin;%PATH%
          python -c "import _game; import game; print('game imports ok')"
          if errorlevel 1 exit /b 1
      - name: sccache stats after build
        if: always()
        shell: cmd
        run: |
          where sccache >nul 2>nul
          if errorlevel 1 exit /b 0
          if not errorlevel 1 sccache --show-stats
      - name: test (c++)
        shell: cmd
        run: |
          ctest --test-dir cmake-build-release --output-on-failure -R for_unit_tests
          if errorlevel 1 exit /b 1
      - name: performance guard (native)
        shell: cmd
        run: |
          ctest --test-dir cmake-build-release --output-on-failure --verbose -L performance
          if errorlevel 1 exit /b 1
      - name: test (python gameplay)
        timeout-minutes: 45
        shell: cmd
        run: |
          set GAME_BUILD_DIR=cmake-build-release
          set GAME_BUILD_CONFIG=Release
          set PATH=%CD%\cmake-build-release;%CD%\cmake-build-release\Release;%VCPKG_INSTALLED_DIR%\%VCPKG_TARGET_TRIPLET%\bin;%PATH%
          python test.py --suite gameplay
          if errorlevel 1 exit /b 1
      - name: package
        if: github.event_name != 'pull_request'
        shell: cmd
        run: |
          cmake --build cmake-build-release --target package --parallel %CMAKE_BUILD_PARALLEL_LEVEL%
          if errorlevel 1 exit /b 1
      - name: sccache stats after package
        if: github.event_name != 'pull_request' && always()
        shell: cmd
        run: |
          where sccache >nul 2>nul
          if errorlevel 1 exit /b 0
          if not errorlevel 1 sccache --show-stats
      - name: publish
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: fall-of-nouraajd-windows
          path: cmake-build-release/fall-of-nouraajd-*.zip
