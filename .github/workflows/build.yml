name: build

on:
  push:
  pull_request:

jobs:
  linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ${{ runner.os }}-ccache-${{ hashFiles('**/CMakeLists.txt') }}
          restore-keys: ${{ runner.os }}-ccache-
      - name: detect coverage need
        id: coverage-needed
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
          else
            base="${{ github.event.before }}"
            head="${{ github.sha }}"
            if [[ -z "${base}" || "${base}" == "0000000000000000000000000000000000000000" ]]; then
              base="$(git rev-list --max-parents=0 "${head}")"
            fi
          fi

          run_coverage=false
          while IFS= read -r path; do
            case "${path}" in
              test.py|tests/*|scripts/run_coverage.sh|scripts/coverage_report.py|src/core/*|src/handler/*|src/object/*)
                run_coverage=true
                break
                ;;
            esac
          done < <(git diff --name-only "${base}" "${head}")

          echo "run=${run_coverage}" >> "${GITHUB_OUTPUT}"
          if [[ "${run_coverage}" == "true" ]]; then
            echo "Coverage is required for this change."
          else
            echo "Coverage is not required for the changed paths."
          fi
      - name: submodules
        run: git submodule update --init --recursive
      - name: install python deps
        run: python -m pip install --upgrade pybind11 pillow
      - name: configure
        run: ./configure.sh
      - name: build test targets
        run: cmake --build cmake-build-release --target _game for_unit_tests -j"$(nproc)"
      - name: ccache stats after build
        if: always()
        shell: bash
        run: |
          if command -v ccache >/dev/null 2>&1; then
            ccache --show-stats
          fi
      - name: test (c++)
        run: ctest --test-dir cmake-build-release --output-on-failure -R for_unit_tests
      - name: test (python)
        run: python3 test.py
      - name: coverage
        if: steps.coverage-needed.outputs.run == 'true'
        run: ./scripts/run_coverage.sh
      - name: ccache stats after coverage
        if: always()
        shell: bash
        run: |
          if command -v ccache >/dev/null 2>&1; then
            ccache --show-stats
          fi
      - name: package
        run: cmake --build cmake-build-release --target package -j"$(nproc)"
      - name: publish
        uses: actions/upload-artifact@v4
        with:
          name: fall-of-nouraajd-linux
          path: cmake-build-release/fall-of-nouraajd-*.tar.gz

  windows:
    runs-on: windows-2022
    env:
      CONFIGURE_BUILD_DIRS: cmake-build-release
      VCPKG_BINARY_SOURCES: clear;x-gha,readwrite
      VCPKG_OVERLAY_TRIPLETS: ${{ github.workspace }}\cmake\triplets
      VCPKG_TARGET_TRIPLET: x64-windows-release
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Python deps
        run: python -m pip install --upgrade pybind11 pillow
      - name: submodules
        run: git submodule update --init --recursive
      - name: Set up vcpkg
        shell: pwsh
        run: |
          if (-not $env:VCPKG_ROOT) {
            $env:VCPKG_ROOT = $env:VCPKG_INSTALLATION_ROOT
          }
          if (-not $env:VCPKG_ROOT) {
            throw "VCPKG_ROOT and VCPKG_INSTALLATION_ROOT are not set"
          }
          "VCPKG_ROOT=$env:VCPKG_ROOT" | Out-File -FilePath $env:GITHUB_ENV -Append
      - name: Enable vcpkg x-gha binary cache
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');
      - name: Install native deps
        shell: pwsh
        run: |
          & "$env:VCPKG_ROOT\vcpkg.exe" install `
            --triplet "$env:VCPKG_TARGET_TRIPLET" `
            --overlay-triplets "$env:VCPKG_OVERLAY_TRIPLETS"
      - name: configure, test, and package
        shell: cmd
        run: |
          call configure.bat
          if errorlevel 1 exit /b 1
          cmake --build cmake-build-release --config Release --target _game for_unit_tests
          if errorlevel 1 exit /b 1
          ctest --test-dir cmake-build-release -C Release --output-on-failure -R for_unit_tests
          if errorlevel 1 exit /b 1
          set GAME_BUILD_DIR=cmake-build-release
          set GAME_BUILD_CONFIG=Release
          set PATH=%CD%\cmake-build-release\Release;%CD%\vcpkg_installed\%VCPKG_TARGET_TRIPLET%\bin;%PATH%
          python test.py
          if errorlevel 1 exit /b 1
          cmake --build cmake-build-release --config Release --target package
          if errorlevel 1 exit /b 1
      - name: publish
        uses: actions/upload-artifact@v4
        with:
          name: fall-of-nouraajd-windows
          path: cmake-build-release/fall-of-nouraajd-*.zip
