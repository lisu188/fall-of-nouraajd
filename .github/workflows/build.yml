name: build

on:
  push:
  pull_request:

jobs:
  linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ${{ runner.os }}-ccache-${{ hashFiles('**/CMakeLists.txt') }}
          restore-keys: ${{ runner.os }}-ccache-
      - name: submodules
        run: git submodule update --init --recursive
      - name: install python deps
        run: python -m pip install --upgrade pybind11 pillow
      - name: configure
        run: ./configure.sh
      - name: build test targets
        run: cmake --build cmake-build-release --target _game for_unit_tests -j"$(nproc)"
      - name: test (c++)
        run: ctest --test-dir cmake-build-release --output-on-failure -R for_unit_tests
      - name: test (python)
        run: python3 test.py
      - name: coverage
        run: ./scripts/run_coverage.sh
      - name: package
        run: cmake --build cmake-build-release --target package -j"$(nproc)"
      - name: publish
        uses: actions/upload-artifact@v4
        with:
          name: fall-of-nouraajd-linux
          path: cmake-build-release/fall-of-nouraajd-*.tar.gz

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: submodules
        run: git submodule update --init --recursive
      - name: install python deps
        run: python -m pip install --upgrade pybind11 pillow
      - name: configure, test, and package
        shell: cmd
        run: |
          call configure.bat
          if errorlevel 1 exit /b 1
          cmake --build cmake-build-release --target _game for_unit_tests
          if errorlevel 1 exit /b 1
          ctest --test-dir cmake-build-release --output-on-failure -R for_unit_tests
          if errorlevel 1 exit /b 1
          python test.py
          if errorlevel 1 exit /b 1
          cmake --build cmake-build-release --target package
          if errorlevel 1 exit /b 1
      - name: publish
        uses: actions/upload-artifact@v4
        with:
          name: fall-of-nouraajd-windows
          path: cmake-build-release/fall-of-nouraajd-*.exe
