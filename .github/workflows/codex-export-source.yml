name: codex-export-source

on:
  pull_request:

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repair branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
      - name: Export exact source snapshots
        run: |
          git fetch --force --prune origin '+refs/heads/*:refs/remotes/origin/*'
          git archive --format=tar.gz --output=repair-729-source.tar.gz HEAD
          git archive --format=tar.gz --output=main-source.tar.gz origin/main
          git archive --format=tar.gz --output=base-729-source.tar.gz 099b91b972c222164b8476c63598c7c8e9d657fc
          git archive --format=tar.gz --output=original-729-source.tar.gz 4b37b79721d346eff42ada786bad2943c61ea5d1
          git archive --format=tar.gz --output=base-731-source.tar.gz e852c2dfcd05a8ffd2b59671e2617ab0960b3ca7
          git archive --format=tar.gz --output=pr-731-source.tar.gz 8cfa91f90ad5f7b583dc709f6b1b85c186af2708
          git archive --format=tar.gz --output=base-502-source.tar.gz 1593f54efac48ebaa02a807accf0d8f9068c75d5
          git archive --format=tar.gz --output=pr-502-source.tar.gz d1a7072b55722a63197248430a4beffb9ffb980d
          git archive --format=tar.gz --output=pr-727-source.tar.gz 8d302dee3a8a53ef94680715b19be4b02fa1a556
          git archive --format=tar.gz --output=pr-735-source.tar.gz 4445abb9186f885c7be7e3c60b49d19b7b34fc5b
      - name: Upload source snapshots
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: codex-all-open-pr-snapshots
          path: '*-source.tar.gz'
          retention-days: 1
