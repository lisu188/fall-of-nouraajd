name: codex-resolve-pr-729

on:
  pull_request:

permissions:
  contents: write

jobs:
  resolve:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repair branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: codex/resolve-pr-729-against-main
          fetch-depth: 0
      - name: Merge main and resolve verified conflicts
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          set +e
          git merge --no-commit --no-ff origin/main
          merge_status=$?
          set -e
          if [[ $merge_status -ne 0 ]]; then
            echo "Merge reported conflicts; applying verified file-specific resolutions."
          fi

          git checkout HEAD -- \
            src/core/CGame.cpp \
            src/core/CGame.h \
            src/core/CGameContext.cpp \
            src/core/CGameContext.h

          git checkout origin/main -- \
            src/core/CModule.cpp \
            src/gui/CGui.cpp \
            tests/unit/test_gui.cpp

          python3 - <<'PY'
          from pathlib import Path

          def insert_once(path: str, anchor: str, addition: str) -> None:
              target = Path(path)
              text = target.read_text(encoding="utf-8")
              if addition.strip() in text:
                  return
              if anchor not in text:
                  raise RuntimeError(f"Anchor not found in {path}: {anchor!r}")
              target.write_text(text.replace(anchor, anchor + addition, 1), encoding="utf-8")

          insert_once(
              "src/core/CModule.cpp",
              '        .def("getRngHandler", &CGameContext::getRngHandler, "Return the random encounter/loot handler.")\n',
              '        .def("isActive", &CGameContext::isActive, "Return whether this game context still accepts session work.")\n'
              '        .def("shutdown", static_cast<void (CGameContext::*)()>(&CGameContext::shutdown),\n'
              '             "Explicitly shut down this game context and release session state.")\n',
          )

          insert_once(
              "src/gui/CGui.cpp",
              '#include "gui/object/CProxyTargetGraphicsObject.h"\n',
              '#include "gui/panel/CGamePanel.h"\n',
          )
          insert_once(
              "src/gui/CGui.cpp",
              'CGui::~CGui() = default;\n\n',
              '''void CGui::shutdown() {
              clearDragSession();
              releasePointerCapture();

              auto topLevelChildren = getChildren();
              for (const auto &child : topLevelChildren) {
                  if (!child || !child->getModal() || !findChild(child)) {
                      continue;
                  }
                  if (auto panel = vstd::cast<CGamePanel>(child)) {
                      panel->close();
                  } else {
                      removeChild(child);
                  }
              }
              setChildren({});
              _textureCache.clear();
              _textManager.clear();
          }

          ''',
          )

          insert_once(
              "tests/unit/test_gui.cpp",
              '#include "core/CGame.h"\n',
              '#include "core/CGameContext.h"\n#include "core/CLoader.h"\n',
          )
          insert_once(
              "tests/unit/test_gui.cpp",
              'struct DragListHarness {\n',
              '''std::shared_ptr<CGame> create_loader_gui_game() {
              auto game = std::make_shared<CGame>();
              for (const auto &[name, builder] : *CTypes::builders()) {
                  game->getObjectHandler()->registerType(name, builder);
              }
              auto guiConfig = std::make_shared<json>();
              (*guiConfig)["class"] = "CGui";
              game->getObjectHandler()->registerConfig("gui", guiConfig);
              return game;
          }

          ''',
          )
          insert_once(
              "tests/unit/test_gui.cpp",
              'void test_gui_routes_mouse_motion_to_target_child() {\n',
              '''void test_loader_gui_sessions_shutdown_stale_callbacks() {
              SDL_SetHint(SDL_HINT_VIDEODRIVER, "dummy");
              SDL_SetHint(SDL_HINT_RENDER_DRIVER, "software");

              auto firstGame = create_loader_gui_game();
              CGameLoader::loadGui(firstGame);
              auto firstGui = firstGame->getGui();
              auto firstContext = firstGame->getContext();
              expect_true(firstGui != nullptr, "first loader GUI session should create a GUI");

              auto firstRecorder = attach_mouse_recorder(firstGui);
              int firstRenderCount = 0;
              firstGui->pushChild(std::make_shared<CountingRenderObject>(firstRenderCount));

              firstContext->shutdown();
              expect_true(!firstContext->isActive(), "first context should be inactive after explicit shutdown");
              expect_true(firstGame->getGui() == nullptr, "first shutdown should detach the game GUI");
              expect_true(firstGui->getChildren().empty(), "first shutdown should clear GUI children");
              drain_event_loop();
              expect_true(firstRecorder->button_count == 0, "first shutdown should prevent stale event dispatch");
              expect_true(firstRenderCount == 0, "first shutdown should prevent stale frame rendering");

              auto secondGame = create_loader_gui_game();
              CGameLoader::loadGui(secondGame);
              auto secondGui = secondGame->getGui();
              auto secondContext = secondGame->getContext();
              expect_true(secondGui != nullptr, "second loader GUI session should create a GUI");

              auto secondRecorder = attach_mouse_recorder(secondGui);
              int secondRenderCount = 0;
              secondGui->pushChild(std::make_shared<CountingRenderObject>(secondRenderCount));

              SDL_Event event{};
              event.type = SDL_MOUSEBUTTONDOWN;
              event.button.button = SDL_BUTTON_LEFT;
              event.button.x = 35;
              event.button.y = 55;
              SDL_PushEvent(&event);
              drain_event_loop();

              expect_true(firstRecorder->button_count == 0, "second session events should not reach the first GUI");
              expect_true(secondRecorder->button_count == 1, "second session should receive one event-loop dispatch");
              expect_true(secondRenderCount > 0, "second active GUI should render through its event-loop callback");

              secondContext->shutdown();
              expect_true(!secondContext->isActive(), "second context should be inactive after explicit shutdown");
              const int renderCountAfterShutdown = secondRenderCount;
              drain_event_loop();
              expect_true(secondRecorder->button_count == 1, "second shutdown should stop later event dispatch");
              expect_true(secondRenderCount == renderCountAfterShutdown, "second shutdown should stop later frame rendering");
          }

          ''',
          )
          insert_once(
              "tests/unit/test_gui.cpp",
              '    test_gui_routes_mouse_motion_to_target_child();\n',
              '    test_loader_gui_sessions_shutdown_stale_callbacks();\n',
          )
          PY

          git rm .github/workflows/codex-export-source.yml
          git add src/core/CGame.cpp src/core/CGame.h src/core/CGameContext.cpp src/core/CGameContext.h \
                  src/core/CModule.cpp src/gui/CGui.cpp tests/unit/test_gui.cpp

          unresolved=$(git diff --name-only --diff-filter=U)
          if [[ -n "$unresolved" ]]; then
            echo "Unresolved conflicts remain:"
            echo "$unresolved"
            exit 1
          fi

          git diff --check --cached
          python3 -m py_compile test.py
          python3 -m unittest tests.test_slot_context_ownership
          git commit -m "Merge main into PR 729 and preserve session shutdown"
          git push origin HEAD:codex/resolve-pr-729-against-main
