name: export queue workflow sources

on:
  pull_request:

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: queue-workflow-sources
          path: |
            planning/*.xlsx
            scripts/issue_queue.py
            scripts/ci_change_classifier.py
            scripts/pr_review_audit.py
            tests/test_issue_queue.py
            tests/test_ci_change_classifier.py
            tests/test_pr_review_audit.py
            tests/test_prompt_inventory.py
            tests/test_workflow_observations.py
            .github/workflows/build.yml
            AGENTS.md
            docs/codex-agent-queue.md
            docs/codex-workflow-observations.md
            prompts/codex-queue-controller.md
            prompts/codex-queue-goal.txt
            prompts/codex-workflow-optimizer.md
          if-no-files-found: error
